name: MegaLinter

on:
  pull_request:
    branches:
      - master

jobs:
  megalinter:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      # Step 1: Checkout full git history
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Scan repository for secrets using TruffleHog
      - name: Scan for Leaked Secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: >
            --results=verified,unknown
            --fail
            --no-verification

      # Step 3: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Step 4: Install dependencies
      - name: Install Dependencies
        run: |
          npm install
          npm install eslint --save-dev

      # Step 5: Run MegaLinter
      - name: Run MegaLinter
        uses: oxsecurity/megalinter@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: true
          ENABLE_LINTERS: JAVASCRIPT_ES
          APPLY_FIXES: none
