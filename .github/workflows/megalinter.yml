name: MegaLinter

on:
  pull_request:
    branches:
      - master

jobs:
  megalinter:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          npm install eslint --save-dev
          
      - name: Scan for Leaked Secrets (TruffleHog)
        uses: trufflesecurity/trufflehog-actions@main
        with:
          base: ""
          head: ${{ github.ref_name }}    

      - name: Run MegaLinter
        uses: oxsecurity/megalinter@v9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: true
          ENABLE_LINTERS: JAVASCRIPT_ES
          APPLY_FIXES: none
